<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks Dashboard - Modern UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 2rem;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .task-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
        }

        .button-group {
            margin-top: 1rem;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: blue;
            color: white;
        }

        .btn-secondary {
            background: purple;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📋 Mis deberes</h1>

        <div class="tasks-grid">

            <!-- Deber 1 -->
            <div class="task-card">
                <h2>Deber 1</h2>
                <p>Ir a la página del deber 1</p>

                <div class="button-group">
                    <!-- ESTE YA FUNCIONA -->
                    <a href="deber1.html" class="btn btn-primary">
                        Ver
                    </a>

                    <button class="btn btn-secondary">
                        Vista previa
                    </button>
                </div>
            </div>

            <!-- Deber 2 -->
            <div class="task-card">
                <h2>Deber 2</h2>
                <p>Otro deber</p>

                <div class="button-group">
                    <button class="btn btn-primary">Ver</button>
                    <button class="btn btn-secondary">Vista previa</button>
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPT CORREGIDO -->
    <script>
    document.querySelectorAll('.btn-secondary').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            alert("Vista previa");
        });
    });
    </script>

</body>
</html>
